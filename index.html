<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Girl Name Reveal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="reveal-box">
            <h1 class="title">✨ Baby Girl Name Reveal ✨</h1>
            
            <div class="box-wrapper">
                <div class="mystery-box" id="mysteryBox">
                    <div class="box-front">
                        <p>Click to Reveal</p>
                        <span class="sparkle">💝</span>
                    </div>
                    <div class="box-back">
                        <h2 class="baby-name" id="babyName">Sarah</h2>
                    </div>
                </div>
            </div>
            
            <button class="reveal-btn" id="revealBtn">🎉 Reveal the Name! 🎉</button>
            
            <div class="confetti" id="confetti"></div>
            
            <div class="info-section">
                <h3>Name Meaning</h3>
                <p class="meaning" id="nameMeaning">Princess - A name of grace and beauty</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
